<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Itini | 旅を藍色に染める</title>
    <meta name="description" content="「Itini（イティニ）」は、記憶に残る藍色の旅のしおりを簡単に作成・共有できる無料のWebサービスです。友達や家族とスケジュールをシェアして、最高の旅行を作りましょう。">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Itini | 旅を藍色に染める">
    <meta property="og:description" content="記憶に残る、藍色の旅のしおりを簡単に作成・共有。">
    <meta property="og:url" content="https://itini.ogawa.jp.net/">
    <meta property="og:site_name" content="Itini">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div id="app" v-cloak>
        <div class="bg-decoration"></div>
        <div class="container">
            <header class="main-header">
                <a href="index.html" class="logo-link">
                    <div class="logo-container">
                        <span class="logo-ruby">イティニ</span>
                        <h1 class="logo-main">Itini</h1>
                    </div>
                </a>
                <p class="subtitle">記憶に残る、藍色のしおり。</p>
            </header>
            <main>
                <div v-if="!generatedUrl" class="glass-card" style="max-width: 600px; margin: 0 auto;">
                    <div class="input-group">
                        <label>旅のタイトル</label>
                        <input type="text" v-model="trip.title" placeholder="例：卒業旅行 in 北海道">
                    </div>
                    <div class="input-group">
                        <label>行き先</label>
                        <input type="text" v-model="trip.destination" placeholder="例：札幌・小樽">
                    </div>
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
                        <div class="input-group">
                            <label>開始日</label>
                            <input type="date" v-model="trip.start_date">
                        </div>
                        <div class="input-group">
                            <label>何日間？</label>
                            <select v-model="trip.duration" required>
                                <option value="" disabled selected>日数を選択してください</option>
                                <option v-for="n in 14" :key="n" :value="n">
                                    {{ n }}日間 
                                </option>
                            </select>
                        </div>
                    </div>
                    <button @click="createTrip" class="btn-indigo">しおりを創り出す</button>
                </div>

                <div v-else class="glass-card" style="max-width: 600px; margin: 0 auto; animation: fadeIn 0.5s;">
                    <h3 style="color: var(--indigo-accent);">しおりが完成しました</h3>
                    <p style="font-size: 0.9rem; color: var(--text-sub); margin-bottom: 20px;">
                        このURLが旅への入り口です。<br>コピーして共有し、ブラウザで開いて編集してください。
                    </p>
                    
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <input type="text" :value="generatedUrl" readonly id="urlInput">
                        <button @click="copyUrl" class="btn-indigo" style="width: auto; margin: 0;">Copy</button>
                    </div>

                    <a :href="generatedUrl" class="btn-indigo" style="display: block; text-decoration: none; text-align: center; width: auto;">
                        編集画面へ移動する
                    </a>
                </div>
            </main>
        </div>
    </div>
    <footer class="main-footer">
        <div class="footer-links"><a href="terms.html">利用規約</a></div>
        <p class="copyright">&copy; 2026 OgawaKeito</p>
        <p class="copyright">v2.0</p>
    </footer>
    <script src="js/app.js"></script>
</body>
</html>
