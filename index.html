<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itini | 藍に溶ける旅のしおり</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>

<body>
    <div id="app">
        <div class="bg-decoration"></div>

        <div class="container">
            <header>
                <h1 class="logo">Itini</h1>
                <p class="subtitle">想い出を藍色に染める、旅の記録</p>
            </header>

            <main>
                <div v-if="!generatedUrl" class="glass-card">
                    <div class="input-group">
                        <label>Trip Title</label>
                        <input type="text" v-model="trip.title" placeholder="例：藍色の夜会">
                    </div>
                    <div class="input-group">
                        <label>Destination</label>
                        <input type="text" v-model="trip.destination" placeholder="例：中目黒">
                    </div>
                    <div class="date-grid">
                        <div class="input-group">
                            <label>Start Date</label>
                            <input type="date" v-model="trip.start_date">
                        </div>
                        <div class="input-group">
                            <label>End Date</label>
                            <input type="date" v-model="trip.end_date">
                        </div>
                    </div>
                    <button @click="createTrip" :disabled="loading" class="btn-indigo">
                        <span v-if="!loading">しおりを創り出す</span>
                        <span v-else>生成中...</span>
                    </button>
                </div>

                <div v-else class="glass-card url-display-area">
                    <h3 style="color: var(--indigo-light); margin-bottom: 1rem;">URLが発行されました</h3>
                    <p style="font-size: 0.8rem; margin-bottom: 1.5rem;">このURLを保存して、旅程の編集を開始してください。</p>

                    <div class="url-copy-group">
                        <input type="text" :value="generatedUrl" readonly id="urlInput">
                        <button @click="copyUrl" class="btn-indigo"
                            style="width: auto; padding: 10px 20px; margin: 0;">コピー</button>
                    </div>

                    <a :href="generatedUrl" class="btn-indigo"
                        style="display: block; text-decoration: none; margin-top: 20px;">
                        編集画面へ移動する
                    </a>

                    <button @click="generatedUrl = ''" class="back-link"
                        style="background:none; border:none; margin-top:15px; cursor:pointer;">
                        ← 新しく作り直す
                    </button>
                </div>
            </main>

            <footer>
                <p>&copy; 2026 Itini Project. Inspired by Indigo.</p>
            </footer>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
